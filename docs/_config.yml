title: AuraLocal
description: On-device LLM & VLM inference for iOS, macOS, and visionOS — MLX + llama.cpp/GGUF, no API keys.
baseurl: "/AuraLocal"
url: "https://iosdevc.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.1

# Color scheme: "light" or "dark"
color_scheme: dark

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Footer
footer_content: "MIT License &copy; 2026 iOSDevC. Powered by <a href=\"https://github.com/just-the-docs/just-the-docs\">Just the Docs</a>."
back_to_top: true
back_to_top_text: "Back to top"

# Nav & callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# GitHub links
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/iOSDevC/AuraLocal"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "edit"

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO
twitter:
  username: iOSDevC
social:
  name: iOSDevC
  links:
    - https://github.com/iOSDevC

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
