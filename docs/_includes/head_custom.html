<!-- Google Search Console verification -->
<meta name="google-site-verification" content="1EbLTvyBQPYm32wzCgWe7kmHngBDdRzaZbnIkaXOZ8Q" />

<!-- Open Graph -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="AuraLocal" />
<meta property="og:title" content="{{ page.title | default: site.title }}" />
<meta property="og:description" content="{{ page.description | default: site.description }}" />
<meta property="og:url" content="{{ page.url | absolute_url }}" />
<meta property="og:image" content="{{ '/assets/images/og-card.png' | absolute_url }}" />

<!-- Twitter/X: large image preview -->
<meta name="twitter:card" content="summary_large_image" />

<!-- Canonical -->
<link rel="canonical" href="{{ page.url | absolute_url }}" />
